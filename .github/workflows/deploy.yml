name: Build and Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Hostinger VPS
        run: |
          # Create compose content with pre-built image
          COMPOSE=$(cat <<'YAML'
          services:
            web:
              image: ghcr.io/sangokp/aegisaicooperative-site:latest
              container_name: aegis-cooperative-site
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.aegis-cooperative.rule=Host(`aegisaicooperative.com`) || Host(`www.aegisaicooperative.com`)"
                - "traefik.http.routers.aegis-cooperative.entrypoints=web,websecure"
                - "traefik.http.routers.aegis-cooperative.tls=true"
                - "traefik.http.routers.aegis-cooperative.tls.certresolver=mytlschallenge"
                - "traefik.http.routers.aegis-cooperative.service=aegis-cooperative-service"
                - "traefik.http.services.aegis-cooperative-service.loadbalancer.server.port=80"
                - "traefik.http.middlewares.aegis-coop-redirect.redirectregex.regex=^https?://www\\.aegisaicooperative\\.com/(.*)"
                - "traefik.http.middlewares.aegis-coop-redirect.redirectregex.replacement=https://aegisaicooperative.com/$${1}"
                - "traefik.http.middlewares.aegis-coop-redirect.redirectregex.permanent=true"
                - "traefik.http.middlewares.aegis-coop-headers.headers.SSLRedirect=true"
                - "traefik.http.middlewares.aegis-coop-headers.headers.STSSeconds=315360000"
                - "traefik.http.middlewares.aegis-coop-headers.headers.browserXSSFilter=true"
                - "traefik.http.middlewares.aegis-coop-headers.headers.contentTypeNosniff=true"
                - "traefik.http.middlewares.aegis-coop-headers.headers.forceSTSHeader=true"
                - "traefik.http.middlewares.aegis-coop-headers.headers.STSIncludeSubdomains=true"
                - "traefik.http.middlewares.aegis-coop-headers.headers.STSPreload=true"
                - "traefik.http.middlewares.aegis-coop-headers.headers.frameDeny=true"
                - "traefik.http.routers.aegis-cooperative.middlewares=aegis-coop-redirect@docker,aegis-coop-headers@docker"
                - "traefik.docker.network=root_default"
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 5s
              networks:
                - root_default

          networks:
            root_default:
              external: true
          YAML
          )

          # Deploy via Hostinger API
          PAYLOAD=$(jq -n --arg name "aegis-cooperative-site" --arg content "$COMPOSE" \
            '{project_name: $name, content: $content}')

          curl -sf -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               -X POST "https://developers.hostinger.com/api/vps/v1/virtual-machines/1170368/docker" \
               -d "$PAYLOAD"

          echo "Deploy triggered successfully"
